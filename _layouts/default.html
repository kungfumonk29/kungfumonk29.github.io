<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Raleway:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.github.build_revision }}">
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">{{ site.title }}</a>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/projects/">Projects</a>
      <a href="/contact/">Contact</a>
    </nav>
  </div>
</header>

<main class="container content">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="container">
    © {{ site.time | date: '%Y' }} {{ site.title }}
  </div>
</footer>

</body>
</html>
